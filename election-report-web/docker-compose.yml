services:
  db:
    image: postgres:16-alpine
    container_name: election-report-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-election_report}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-election_report_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-election_report}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-election_report} -d ${POSTGRES_DB:-election_report}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
